<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Runden">
<meta name="theme-color" content="#1a1f2e">
<title>Kaufmännisches Runden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1218;
    --surface: #1a1f2e;
    --surface2: #232a3b;
    --accent: #e8c547;
    --accent2: #5bc4a0;
    --danger: #e85c5c;
    --text: #e8e6df;
    --muted: #7a8099;
    --border: #2c3347;
    --mono: 'DM Mono', monospace;
    --display: 'Playfair Display', serif;
    --body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 16px;
    position: relative;
  }

  /* Hintergrund-Muster */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(232,197,71,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 10% 80%, rgba(91,196,160,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Dezentes Gitter */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Header */
  .header {
    text-align: center;
  }

  .header-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.8;
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: var(--display);
    font-size: clamp(22px, 6vw, 30px);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }

  /* Score-Leiste */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
  }

  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .score-item span:first-child {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .score-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
  }

  .score-value.correct { color: var(--accent2); }
  .score-value.wrong { color: var(--danger); }
  .score-value.total { color: var(--text); }

  .score-divider {
    width: 1px;
    height: 30px;
    background: var(--border);
  }

  /* Aufgaben-Karte */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .aufgabe-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .zahl-display {
    text-align: center;
    padding: 16px 0 8px;
  }

  .zahl-display .zahl {
    font-family: var(--mono);
    font-size: clamp(28px, 9vw, 40px);
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 2px;
    display: block;
  }

  .auftrag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    color: var(--text);
    line-height: 1.4;
    text-align: center;
  }

  .auftrag strong {
    color: var(--accent2);
    font-weight: 500;
  }

  /* Eingabebereich */
  .input-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 18px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"].richtig {
    border-color: var(--accent2);
    background: rgba(91,196,160,0.07);
  }

  input[type="text"].falsch {
    border-color: var(--danger);
    background: rgba(232,92,92,0.07);
  }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    font-family: var(--body);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f1218;
    flex: 1;
  }

  .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:active { opacity: 0.7; }

  /* Feedback */
  .feedback {
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
    animation: fadeIn 0.25s ease;
  }

  .feedback.show { display: block; }

  .feedback.richtig {
    background: rgba(91,196,160,0.12);
    border: 1px solid rgba(91,196,160,0.3);
    color: var(--accent2);
  }

  .feedback.falsch {
    background: rgba(232,92,92,0.1);
    border: 1px solid rgba(232,92,92,0.25);
    color: #f09090;
  }

  .feedback .loesung {
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--text);
  }

  /* Neue Aufgabe Button */
  .btn-neu {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-neu:hover, .btn-neu:active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Fortschrittsbalken */
  .progress-wrap {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .shake { animation: shake 0.35s ease; }

  /* Install-Hinweis */
  .install-hint {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header-label">Lernapp · Mathematik</div>
    <h1>Kaufmännisches<br>Runden</h1>
  </div>

  <div class="score-bar">
    <div class="score-item">
      <span>Richtig</span>
      <span class="score-value correct" id="scoreRichtig">0</span>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <span>Falsch</span>
      <span class="score-value wrong" id="scoreFalsch">0</span>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <span>Gesamt</span>
      <span class="score-value total" id="scoreGesamt">0</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
  </div>

  <div class="card">
    <div class="aufgabe-label">Aufgabe</div>

    <div class="zahl-display">
      <span class="zahl" id="zahlanzeige">—</span>
    </div>

    <div class="auftrag" id="auftrag">
      Bitte warten…
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="eingabe" placeholder="Gerundete Zahl" inputmode="decimal" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn btn-secondary" id="btnPruefe" onclick="pruefen()">✓</button>
      </div>
    </div>

    <div class="feedback" id="feedback"></div>

    <button class="btn-neu" id="btnNeu" onclick="neueAufgabe()">↻ Neue Aufgabe</button>
  </div>

  <div class="install-hint">Zum Homescreen hinzufügen für Offline-Nutzung</div>

</div>

<script>
// ─── Rundungsstufen ─────────────────────────────────────────────────────────
const stufen = [
  { text: 'auf <strong>Zehntausender</strong>',   stellen: -4, beispiel: '12340,00000 → 10000' },
  { text: 'auf <strong>Tausender</strong>',        stellen: -3, beispiel: '1234,56789 → 1000' },
  { text: 'auf <strong>Hunderter</strong>',        stellen: -2, beispiel: '234,56789 → 200' },
  { text: 'auf <strong>Zehner</strong>',           stellen: -1, beispiel: '34,56789 → 30' },
  { text: 'auf <strong>Einer</strong>',            stellen:  0, beispiel: '4,56789 → 5' },
  { text: 'auf <strong>Zehntel</strong>',          stellen:  1, beispiel: '4,56789 → 4,6' },
  { text: 'auf <strong>Hundertstel</strong>',      stellen:  2, beispiel: '4,56789 → 4,57' },
  { text: 'auf <strong>Tausendstel</strong>',      stellen:  3, beispiel: '4,56789 → 4,568' },
  { text: 'auf <strong>Zehntausendstel</strong>',  stellen:  4, beispiel: '4,56789 → 4,5679' },
];

let aktuelleZahl = 0;
let aktuelleStufe = null;
let korrekteLoesung = '';
let scoreRichtig = 0;
let scoreFalsch = 0;
let beantwortet = false;

// ─── Kaufmännisches Runden ───────────────────────────────────────────────────
function kaufmaennischRunden(zahl, stellen) {
  // Exakte Berechnung über String-Manipulation um Floating-Point-Fehler zu vermeiden
  const faktor = Math.pow(10, stellen);
  const verschoben = zahl * faktor;
  const gerundet = Math.round(verschoben);
  return gerundet / faktor;
}

function formatZahl(zahl, stellen) {
  if (stellen <= 0) {
    // Keine Nachkommastellen bei negativen stellen
    const wert = Math.round(zahl / Math.pow(10, -stellen)) * Math.pow(10, -stellen);
    return wert.toLocaleString('de-DE', { maximumFractionDigits: 0 });
  } else {
    return zahl.toLocaleString('de-DE', {
      minimumFractionDigits: stellen,
      maximumFractionDigits: stellen
    });
  }
}

// ─── Zufallszahl erzeugen ────────────────────────────────────────────────────
function zufallszahl() {
  // Zahl mit sinnvollem Wertebereich, immer 5 Nachkommastellen
  const vorkomma = Math.floor(Math.random() * 9000) + 100; // 100–9099
  const nachkomma = Math.floor(Math.random() * 90000) + 10000; // 10000–99999
  const zahl = vorkomma + nachkomma / 100000;
  return Math.round(zahl * 100000) / 100000;
}

// ─── Neue Aufgabe ────────────────────────────────────────────────────────────
function neueAufgabe() {
  beantwortet = false;
  aktuelleZahl = zufallszahl();
  aktuelleStufe = stufen[Math.floor(Math.random() * stufen.length)];

  // Zahl anzeigen (immer 5 Nachkommastellen, deutsche Formatierung)
  document.getElementById('zahlanzeige').textContent =
    aktuelleZahl.toLocaleString('de-DE', { minimumFractionDigits: 5, maximumFractionDigits: 5 });

  // Auftrag anzeigen
  document.getElementById('auftrag').innerHTML =
    'Runden Sie die Zahl ' + aktuelleStufe.text + '.';

  // Korrekte Lösung berechnen
  const gerundet = kaufmaennischRunden(aktuelleZahl, aktuelleStufe.stellen);
  korrekteLoesung = formatZahl(gerundet, Math.max(0, aktuelleStufe.stellen));

  // UI zurücksetzen
  const eingabe = document.getElementById('eingabe');
  eingabe.value = '';
  eingabe.className = '';
  eingabe.focus();

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
}

// ─── Prüfen ──────────────────────────────────────────────────────────────────
function pruefen() {
  if (beantwortet) { neueAufgabe(); return; }

  const eingabe = document.getElementById('eingabe');
  const eingabeWert = eingabe.value.trim().replace('.', ','); // Punkt → Komma
  const fb = document.getElementById('feedback');

  if (!eingabeWert) {
    eingabe.classList.add('shake');
    setTimeout(() => eingabe.classList.remove('shake'), 400);
    return;
  }

  // Vergleich: Normalisierung (Komma → Punkt, führende Nullen etc.)
  const eingabeNorm = parseFloat(eingabeWert.replace(',', '.'));
  const korrektNorm = parseFloat(korrekteLoesung.replace(/\./g, '').replace(',', '.'));

  const richtig = Math.abs(eingabeNorm - korrektNorm) < 0.000001;

  if (richtig) {
    scoreRichtig++;
    eingabe.className = 'richtig';
    fb.className = 'feedback richtig show';
    fb.innerHTML = '✓ Richtig! Sehr gut.';
  } else {
    scoreFalsch++;
    eingabe.className = 'falsch';
    eingabe.classList.add('shake');
    setTimeout(() => eingabe.classList.remove('shake'), 400);
    fb.className = 'feedback falsch show';
    fb.innerHTML = '✗ Leider falsch.<div class="loesung">Korrekte Antwort: <strong>' + korrekteLoesung + '</strong></div>';
  }

  beantwortet = true;
  scoreAnzeigen();
}

// ─── Score anzeigen ──────────────────────────────────────────────────────────
function scoreAnzeigen() {
  const gesamt = scoreRichtig + scoreFalsch;
  document.getElementById('scoreRichtig').textContent = scoreRichtig;
  document.getElementById('scoreFalsch').textContent = scoreFalsch;
  document.getElementById('scoreGesamt').textContent = gesamt;

  const quote = gesamt > 0 ? (scoreRichtig / gesamt) * 100 : 0;
  document.getElementById('progressBar').style.width = quote + '%';
}

// ─── Enter-Taste ─────────────────────────────────────────────────────────────
document.getElementById('eingabe').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') pruefen();
});

// ─── Start ───────────────────────────────────────────────────────────────────
neueAufgabe();

// ─── Service Worker für Offline ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  // Inline Service Worker als Blob
  const swCode = `
    const CACHE = 'runden-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll([
        self.location.pathname
      ])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>

</body>
</html>
